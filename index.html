<!DOCTYPE html>
<html>
<head>
  <title>Drink Order Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background: #fff7f0;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .card {
      background: #fff7f0;
      border-radius: 20px;
      padding: 25px;
      width: 300px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      background: #f6b6c8;
      font-size: 16px;
    }

    #drink {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    #message {
      margin-top: 10px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>☕ Digital Barista</h2>
    <p>Click for your tiny daily booster.</p>

    <button onclick="orderDrink()">Order my drink</button>

    <div id="drink"></div>
    <div id="message"></div>
  </div>

  <script>
    const drinks = [
      "Iced Matcha Latte 🍵",
      "Strawberry Milk 🍓",
      "Brown Sugar Boba 🧋",
      "Lavender Latte 💜",
      "Vanilla Chai ☕",
      "Peach Green Tea 🍑",
      "Honey Milk Tea 🍯"
    ];

    const messages = [
      "You earned a soft reset.",
      "Your focus reward is ready.",
      "A tiny treat for tiny progress.",
      "Romanticizing productivity, one sip at a time.",
      "Your digital barista is proud of you."
    ];

    function orderDrink() {
      const drink = drinks[Math.floor(Math.random() * drinks.length)];
      const message = messages[Math.floor(Math.random() * messages.length)];

      document.getElementById("drink").innerText = drink;
      document.getElementById("message").innerText = message;
    }
  </script>
</body>
</html>
