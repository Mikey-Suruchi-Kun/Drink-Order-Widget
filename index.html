<!DOCTYPE html>
<html>
<head>
  <title>Drink Order Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background: #fff7f0;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .card {
      background: #fff7f0;
      border-radius: 20px;
      padding: 25px;
      width: 300px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      background: #f6b6c8;
      font-size: 16px;
    }

    #drink {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    #message {
      margin-top: 10px;
      color: #666;
    }
    .section {
  margin: 18px 0;
}

.section p {
  margin-bottom: 8px;
  font-weight: bold;
}

.order-btn {
  margin-top: 15px;
  background: #d8b4fe;
}

#brewing {
  margin-top: 20px;
  font-size: 16px;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { opacity: 0.4; }
  50% { opacity: 1; }
  100% { opacity: 0.4; }
}
  </style>
  
</head>
<body>
  <div class="card">
    <h2>☕ Digital Barista</h2>
    <p>Choose your order.</p>

    <div class="section">
      <p>Temperature</p>
      <button onclick="setTemp('Iced')">Iced</button>
      <button onclick="setTemp('Hot')">Hot</button>
    </div>

    <div class="section">
      <p>Drink Type</p>
      <button onclick="setType('Matcha')">Matcha</button>
      <button onclick="setType('Coffee')">Coffee</button>
      <button onclick="setType('Boba')">Boba</button>
      <button onclick="setType('Random')">Random</button>
    </div>

    <button class="order-btn" onclick="orderDrink()">Brew my drink</button>

    <div id="brewing"></div>
    <div id="drink"></div>
    <div id="message"></div>
  </div>

  <script>
  let selectedTemp = "Iced";
  let selectedType = "Random";

  const drinkOptions = {
    Matcha: ["Matcha Latte 🍵", "Strawberry Matcha 🍓", "Honey Matcha 🍯"],
    Coffee: ["Vanilla Latte ☕", "Caramel Macchiato 🤎", "Mocha Latte 🍫"],
    Boba: ["Brown Sugar Boba 🧋", "Thai Milk Tea Boba 🧡", "Taro Boba 💜"]
  };

  const messages = [
    "You earned a soft reset.",
    "Your focus reward is ready.",
    "A tiny treat for tiny progress.",
    "Productivity time.",
    "Your digital barista is proud of you."
  ];

  function setTemp(temp) {
    selectedTemp = temp;
  }

  function setType(type) {
    selectedType = type;
  }

  function orderDrink() {
    const brewing = document.getElementById("brewing");
    const drinkDiv = document.getElementById("drink");
    const messageDiv = document.getElementById("message");

    drinkDiv.innerText = "";
    messageDiv.innerText = "";
    brewing.innerText = "Brewing your drink... ☁️";

    setTimeout(() => {
      let finalType = selectedType;

      if (selectedType === "Random") {
        const types = ["Matcha", "Coffee", "Boba"];
        finalType = types[Math.floor(Math.random() * types.length)];
      }

      const drinks = drinkOptions[finalType];
      const drink = drinks[Math.floor(Math.random() * drinks.length)];
      const message = messages[Math.floor(Math.random() * messages.length)];

      brewing.innerText = "";
      drinkDiv.innerText = `${selectedTemp} ${drink}`;
      messageDiv.innerText = message;
    }, 1500);
  }
</script>
</body>
</html>
